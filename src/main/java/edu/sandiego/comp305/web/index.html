<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solar System Simulator</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #canvas { display: block; background: #000; }
        #controls { position: fixed; top: 8px; left: 8px; padding: 8px; background: rgba(0,0,0,0.5); }
        #controls > * { margin-right: 8px; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1280" height="800"></canvas>
    <div id="controls">
        <button id="play-pause">Pause</button>
        <label>Speed <input id="speed" type="range" min="0.1" max="5" step="0.1" value="1"></label>
        <button id="reset">Reset</button>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
